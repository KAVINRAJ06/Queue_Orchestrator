services:
  postgres:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: queue_orchestrator
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d queue_orchestrator"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build: ./backend
    restart: unless-stopped
    command: sh -c "npm run migrate && npm start"
    environment:
      PORT: 4000
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/queue_orchestrator
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-compose-secret-change-me
      CORS_ORIGIN: http://localhost:5173
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build: ./backend
    restart: unless-stopped
    command: sh -c "npm run migrate && npm run worker"
    environment:
      DATABASE_URL: postgres://postgres:postgres@postgres:5432/queue_orchestrator
      REDIS_URL: redis://redis:6379
      JWT_SECRET: dev-compose-secret-change-me
      WORKER_CONCURRENCY: 4
      POLL_INTERVAL_MS: 1000
      HEARTBEAT_INTERVAL_MS: 5000
      JOB_LEASE_MS: 30000
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      backend:
        condition: service_started

  frontend:
    build:
      context: ./frontend
      args:
        VITE_API_URL: http://localhost:4000/api
    restart: unless-stopped
    environment:
      VITE_API_URL: http://localhost:4000/api
    ports:
      - "5173:4173"
    depends_on:
      - backend

volumes:
  postgres_data:
